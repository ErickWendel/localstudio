name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that trigger the bug.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots or recordings
      description: Add visual evidence if the issue affects UI or generated output.
    validations:
      required: false
