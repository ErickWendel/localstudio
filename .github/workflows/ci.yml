name: CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - 'apps/**'
      - 'packages/**'
      - 'scripts/**'
      - 'tests/**'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'prettier.config.cjs'
      - 'tsconfig.json'
      - '!**/*.md'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - 'apps/**'
      - 'packages/**'
      - 'scripts/**'
      - 'tests/**'
      - 'eslint.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'prettier.config.cjs'
      - 'tsconfig.json'
      - '!**/*.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: localstudio-dist
          path: dist

      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: localstudio-dist
          path: dist

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Unit tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: localstudio-dist
          path: dist

      - name: Test with coverage
        run: npm run test:coverage

      - name: Add coverage report to job summary
        if: always()
        run: cat coverage-report/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage-report
          if-no-files-found: error

      - name: Upload unit coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-data
          path: |
            apps/landing/coverage/coverage-summary.json
            apps/editor/coverage/coverage-summary.json
            apps/joystick/coverage/coverage-summary.json
          if-no-files-found: error

  e2e:
    name: Playwright E2E
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: localstudio-dist
          path: dist

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium

      - name: End-to-end test
        run: npm run test:e2e
        env:
          E2E_SERVER: dist

      - name: Upload Playwright coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-coverage
          path: playwright-coverage
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          LOCALSTUDIO_BASE_PATH: /

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: localstudio-dist
          path: dist
          if-no-files-found: error

  pages-artifact:
    name: Prepare Pages artifact
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [build, test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: localstudio-dist
          path: dist

      - name: Download unit coverage data
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-data
          path: apps

      - name: Download Playwright coverage
        uses: actions/download-artifact@v4
        with:
          name: playwright-coverage
          path: playwright-coverage

      - name: Generate coverage report
        run: node scripts/coverage-report.mjs

      - name: Add coverage report to job summary
        run: cat coverage-report/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish coverage report with site
        run: mkdir -p dist/coverage && cp -R coverage-report/. dist/coverage/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy site
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test, e2e, pages-artifact]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment_result.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment_attempt_1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment_attempt_1.outcome == 'failure'
        run: sleep 30

      - name: Retry deploy to GitHub Pages
        id: deployment_attempt_2
        if: steps.deployment_attempt_1.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Resolve deployment URL
        id: deployment_result
        if: always()
        run: echo "page_url=${{ steps.deployment_attempt_1.outputs.page_url || steps.deployment_attempt_2.outputs.page_url }}" >> "$GITHUB_OUTPUT"
